<!DOCTYPE html>

<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Gülüm Yufka</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin:0; background:#fff; }
    header { background:#ff4da6; color:white; text-align:center; padding:15px; font-size:20px; }
    .container { padding:10px; }
    .box { border:2px solid #ff4da6; margin-bottom:10px; padding:10px; border-radius:10px; }
    h3 { margin:0 0 10px 0; }
    input, select { width:100%; padding:8px; margin-bottom:8px; }
    button { width:100%; padding:10px; background:#ff4da6; color:white; border:none; border-radius:5px; }
  </style>
</head>
<body>

<header>Gülüm Yufka</header>

<div class="container">

<div class="box">
<h3>İrsaliye</h3>
<select>
<option>Yufka</option>
<option>Mantı</option>
<option>500gr Mantı</option>
</select>
<input placeholder="Miktar">
<input placeholder="Verilen Yer">
<button>Kaydet</button>
</div>

<div class="box">
<h3>Askeriye</h3>
<select>
<option>Yufka</option>
<option>Mantı</option>
<option>500gr Mantı</option>
</select>
<input placeholder="Miktar">
<input placeholder="Verilen Yer">
<button>Kaydet</button>
</div>

<div class="box">
<h3>Nakit</h3>
<input placeholder="Tutar">
<input placeholder="Verilen Yer">
<button>Kaydet</button>
</div>

<div class="box">
<h3>Açık Paket</h3>
<input placeholder="Bilgi">
<button>Kaydet</button>
</div>

<div class="box">
<h3>Giderler</h3>
<input placeholder="Açıklama">
<input placeholder="Tutar">
<button>Kaydet</button>
</div>

</div>

</body>
</html>
